# Canonical claims registry. Every verifiable number/deadline/rule gets a stable
# C### ID. _claims.md is the human projection — keep id/claim/source/status/topic
# synchronized (projection rule). Never reuse an ID; retired claims keep tombstone
# rows. Assign new IDs sequentially after the highest existing ID.
#
# status: active (verified against source) | needs_review (unverified or ambiguous) | retired
# review_triggers: source_ambiguous | stale_source | point_in_time | conflict

