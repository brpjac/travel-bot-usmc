  - id: C017
    category: Entitlements
    claim: "IDT outside the normal commuting distance (150+ miles one way by DTOD) may rate actual-expense reimbursement for transportation, lodging, and meals limited to $500 per round trip — only for members meeting an eligibility criterion and when authorized by the Secretary concerned"
