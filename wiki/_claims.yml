    preferred_claim_id: C041
    review_triggers: [stale_source]
    notes: "Superseded: the cap was raised to $750 for round trips ending on or after 27 Dec 2024 (MARADMIN 157/25, implementing the current JTR). Kept as tombstone; $500 still governs round trips that ended before 27 Dec 2024."
